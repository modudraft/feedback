name: Bug report
description: Something isn't working as expected
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to report a bug! Please fill out as much as you can."
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where did this happen?
      options:
        - Web app (app.modudraft.com)
        - MCP server (@modudraft/mcp)
        - VSCode extension
        - Obsidian plugin
        - Other
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / OS (for web app bugs)
      placeholder: "e.g. Chrome 125 on macOS 14"
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, console errors, or anything else helpful.
